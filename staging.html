<html lang="en">

    <title>Marker Widget Test</title>
    <!-- trigger deploy -->

    <!-- prettier-ignore -->
    <script>
      // ---- Repro payload for CS-1826 ----
      // customData values must be primitives; pre-stringify large structures
      // into single big strings so they survive the widget's type filter.
      var lorem = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. ';

      var httpLog = '';
      for (var i = 0; i < 17; i++) {
        httpLog +=
          '[' + i + '] ' +
          ['GET', 'POST', 'PUT', 'DELETE'][i % 4] + ' ' +
          'https://api.example.com/v1/resource/' + i +
          ' -> ' + [200, 201, 400, 500][i % 4] + '\n' +
          'authorization: Bearer eyJhbGciOiJIUzI1NiJ9.' + new Array(180).join('x') + '\n' +
          'request:  ' + lorem.repeat(3) + '\n' +
          'response: ' + lorem.repeat(3) + '\n\n';
      }

      var dashboardFilters = '';
      for (var j = 0; j < 20; j++) {
        dashboardFilters += 'filter_' + j + ' = ' + lorem.repeat(2) + '\n';
      }

      window.markerConfig = {
        project: '69fdf4f6e547688f5d1b5372',
        source: 'snippet',
        customData: {
          httpLog: httpLog,                   // ~80 KB string
          trace: 'null-byte:\u0000end',
          // dashboardFilters: dashboardFilters, // ~25 KB string
          buildVersion: '4.12.7-rc.3',
          sessionId: 'sess-' + Date.now()
        }
      };

      !function(e,r,a){if(!e.__Marker){e.__Marker={};var t=[],n={__cs:t};["show","hide","isVisible","capture","cancelCapture","unload","reload","isExtensionInstalled","setReporter","clearReporter","setCustomData","on","off"].forEach(function(e){n[e]=function(){var r=Array.prototype.slice.call(arguments);r.unshift(e),t.push(r)}}),e.Marker=n;var s=r.createElement("script");s.async=1,s.src="https://localhost:1234/shim.js";var i=r.getElementsByTagName("script")[0];i.parentNode.insertBefore(s,i)}}(window,document);
    </script>
  </head>
