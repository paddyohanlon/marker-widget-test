    <script>

      // ---- Repro payload for CS-1826 ----
      (function () {
        var lorem = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. ';
        var bigBlob = lorem.repeat(6); // ~1.4 KB per entry

        var httpLog = [];
        for (var i = 0; i < 50; i++) {
          httpLog.push({
            id: i,
            method: ['GET', 'POST', 'PUT', 'DELETE'][i % 4],
            url: 'https://api.example.com/v1/resource/' + i + '?expand=details,permissions,owner&filter=active',
            status: [200, 201, 400, 500][i % 4],
            durationMs: 120 + i,
            requestHeaders: {
              'authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.' + 'x'.repeat(180),
              'content-type': 'application/json',
              'x-trace-id': 'trace-' + i
            },
            requestBody: { payload: bigBlob, idx: i },
            responseBody: { data: bigBlob, idx: i, ok: i % 4 !== 2 }
          });
        }

        var dashboardFilters = {};
        for (var j = 0; j < 30; j++) {
          dashboardFilters['filter_' + j] = { value: bigBlob, enabled: j % 2 === 0 };
        }

        var featureFlags = {};
        for (var k = 0; k < 40; k++) {
          featureFlags['flag_' + k] = { enabled: !!(k % 2), notes: bigBlob };
        }

        var userConfig = {
          preferences: { theme: 'dark', locale: 'en-US', timezone: 'America/New_York' },
          featureFlags: featureFlags
        };

        Marker.setCustomData({
          httpLog: httpLog,                   // ~70 KB JSON
          dashboardFilters: dashboardFilters, // ~45 KB JSON
          userConfig: userConfig,             // ~60 KB JSON
          sessionId: 'sess-' + Date.now(),
          buildVersion: '4.12.7-rc.3'
        });
      })();
